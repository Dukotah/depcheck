<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DepCheck — apple touch icon</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{margin:0}
  .icon{
    width:180px;height:180px;background:#bf6b3c;
    display:flex;align-items:center;justify-content:center;
    /* apple rounds corners itself, but a subtle inset depth helps the screenshot */
    position:relative;overflow:hidden;
  }
  .icon::before{content:"";position:absolute;inset:0;background:radial-gradient(120% 120% at 30% 18%, rgba(255,255,255,.16), rgba(0,0,0,.12));}
  .mark{width:120px;height:120px;position:relative;z-index:1}
</style>
</head>
<body>
  <div class="icon">
    <svg class="mark" viewBox="0 0 64 64" aria-hidden="true">
      <!-- on copper bg: package box in ink, check badge in white -->
      <path d="M30 6 50 16 30 26 10 16 Z" fill="#14181f"/>
      <path d="M10 16 30 26 30 48 10 38 Z" fill="#14181f"/>
      <path d="M50 16 30 26 30 48 50 38 Z" fill="#1d222b"/>
      <path d="M30 6 30 26" stroke="#0d1117" stroke-width="2" stroke-linecap="round"/>
      <circle cx="48" cy="46" r="13" fill="#ffffff"/>
      <path d="M42 46 46.5 50.5 55 41.5" fill="none" stroke="#bf6b3c" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</body>
</html>
